---
layout: default
title: Contact
---
<section class="py-5">
  <div class="container py-5">

    <div class="text-center mb-5">
      <h1 class="fw-bold">Contact Us</h1>
      <p class="text-muted">
        Have a question or want to work together? Send us a message.
      </p>
    </div>

    <div class="row justify-content-center">
      <div class="col-lg-8">

        <div class="card shadow-sm border-0">
          <div class="card-body p-4 p-md-5">

            <form 
              class="needs-validation" 
              novalidate
              action="https://formspree.io/f/xdayjqrd" 
              method="POST"
            >

              <!-- Name -->
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-person"></i> Name
                </label>
                <input 
                  type="text" 
                  name="name" 
                  class="form-control" 
                  required
                >
                <div class="invalid-feedback">
                  Please enter your name.
                </div>
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-envelope"></i> Email
                </label>
                <input 
                  type="email" 
                  name="email" 
                  class="form-control" 
                  required
                >
                <div class="invalid-feedback">
                  Please enter a valid email address.
                </div>
              </div>

              <!-- Subject -->
              <div class="mb-3">
                <label class="form-label">
                  <i class="bi bi-chat-dots"></i> Subject
                </label>
                <input 
                  type="text" 
                  name="subject" 
                  class="form-control"
                  required
                >
                <div class="invalid-feedback">
                  Please enter a subject.
                </div>
              </div>

              <!-- Message -->
              <div class="mb-4">
                <label class="form-label">
                  <i class="bi bi-pencil-square"></i> Message
                </label>
                <textarea 
                  name="message" 
                  rows="5" 
                  class="form-control" 
                  required
                ></textarea>
                <div class="invalid-feedback">
                  Please enter a message.
                </div>
              </div>

              <!-- Hidden -->
              <input type="hidden" name="_subject" value="New message from 393Enterprise.com">

              <!-- Submit -->
              <div class="d-grid">
                <button type="submit" class="btn btn-primary btn-lg">
                  <i class="bi bi-send"></i> Send Message
                </button>
              </div>

            </form>

          </div>
        </div>

      </div>
    </div>

  </div>
</section>
